<div class="cart-row">
  <div class="cart-row__img-wrap">
    <img [src]="item.product.images[0]" [alt]="item.product.name" class="cart-row__img" />
  </div>
  <div class="cart-row__info">
    <div class="cart-row__name">{{ item.product.name }}</div>
    @if (getOptionsString() !== '') {
      <div class="cart-row__variants">{{ getOptionsString() }}</div>
    } @else {
      <div class="cart-row__cat">{{ item.product.category }}</div>
    }
    <div class="cart-row__bottom">
      <div class="qty-control">
        <button class="qty-btn" (click)="decrease()" [id]="'qty-dec-' + item.product.id" aria-label="Decrease">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <span class="qty-value">{{ item.quantity }}</span>
        <button class="qty-btn" (click)="increase()" [id]="'qty-inc-' + item.product.id" aria-label="Increase">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <span class="cart-row__total">{{ lineTotal | currencyInr }}</span>
    </div>
  </div>
  <button class="cart-row__remove" (click)="remove()" [id]="'remove-' + item.product.id" aria-label="Remove item">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>
