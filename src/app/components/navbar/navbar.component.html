<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="container navbar__inner">

    <!-- Logo -->
    <a routerLink="/" class="navbar__logo" id="nav-logo">
      <!-- LOOPMANS 3D Play Button SVG Logo -->
      <svg class="logo-svg" width="42" height="42" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lpmNav" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#93c5fd"/>
            <stop offset="45%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#1e40af"/>
          </linearGradient>
        </defs>
        <!-- Red swoosh arc -->
        <path d="M 12,88 Q 55,110 98,88" stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- Outer play button triangle (blue) -->
        <path d="M 16,10 L 16,90 L 94,50 Z" fill="url(#lpmNav)"/>
        <!-- Inner hollow cutout -->
        <path d="M 28,27 L 28,73 L 72,50 Z" fill="#05060f"/>
        <!-- 3D top highlight face -->
        <path d="M 16,10 L 28,27 L 72,50 L 94,50 Z" fill="#bfdbfe" fill-opacity="0.28"/>
        <!-- 3D bottom darker face -->
        <path d="M 16,90 L 28,73 L 72,50 L 94,50 Z" fill="#1e3a8a" fill-opacity="0.45"/>
        <!-- Left edge highlight strip -->
        <path d="M 16,10 L 16,23 L 27,27" fill="none" stroke="#dbeafe" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-text">
        <span class="logo-brand">LOOPMANS</span>
        <span class="logo-sub">Carbon Fiber</span>
      </div>
    </a>

    <!-- Desktop nav links -->
    <ul class="navbar__links hide-mobile">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Shop</a></li>
      <li><a href="#categories" (click)="scrollTo('categories', $event)">Categories</a></li>
      <li><a href="#features" (click)="scrollTo('features', $event)">About</a></li>
      <li><a href="#testimonials" (click)="scrollTo('testimonials', $event)">Reviews</a></li>
    </ul>

    <!-- Actions -->
    <div class="navbar__actions">
      <button class="cart-btn" id="cart-btn" (click)="openCart()" aria-label="Open cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        @if (cartCount > 0) {
          <span class="cart-badge" id="cart-badge">{{ cartCount }}</span>
        }
      </button>

      <!-- Hamburger -->
      <button class="hamburger hide-desktop" [class.open]="mobileMenuOpen" (click)="toggleMenu()" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <!-- Mobile menu -->
  @if (mobileMenuOpen) {
    <div class="mobile-menu">
      <ul>
        <li><a routerLink="/" (click)="mobileMenuOpen=false">Shop All</a></li>
        <li><a href="#categories" (click)="scrollTo('categories',$event)">Categories</a></li>
        <li><a href="#features" (click)="scrollTo('features',$event)">About</a></li>
        <li><a href="#testimonials" (click)="scrollTo('testimonials',$event)">Reviews</a></li>
      </ul>
      <button class="btn btn--primary btn--full" (click)="openCart()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        View Cart {{ cartCount > 0 ? '(' + cartCount + ')' : '' }}
      </button>
    </div>
  }
</nav>
