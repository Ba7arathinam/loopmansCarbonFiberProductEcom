<div class="overlay-backdrop" (click)="continueShopping()"></div>

<div class="success-modal" id="order-success-modal" role="dialog" aria-modal="true">
  <div class="success-modal__inner">

    <!-- Animated checkmark -->
    <div class="success-check">
      <svg class="success-check__svg" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="46" stroke="rgba(0,229,255,0.2)" stroke-width="3"/>
        <circle cx="50" cy="50" r="46" class="success-check__ring" stroke="var(--clr-primary)" stroke-width="3" stroke-dasharray="290" stroke-dashoffset="290"/>
        <polyline class="success-check__mark" points="28,52 44,68 72,34"
          stroke="var(--clr-primary)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
          fill="none" stroke-dasharray="100" stroke-dashoffset="100"/>
      </svg>
    </div>

    <!-- Content -->
    <div class="success-modal__badge">Order Confirmed</div>
    <h2 class="success-modal__title">You're all set! 🎉</h2>
    <p class="success-modal__sub">
      Your order has been placed and our team will begin processing it right away.
    </p>

    <div class="success-modal__order-id glass-card">
      <span class="success-modal__order-label">Order Reference</span>
      <span class="success-modal__order-num">{{ orderId }}</span>
    </div>

    <div class="success-modal__info">
      <div class="info-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--clr-primary)" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <span>Dispatched within 2–3 business days</span>
      </div>
      <div class="info-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--clr-primary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>Confirmation email sent to your inbox</span>
      </div>
    </div>

    <div class="success-modal__actions">
      <button class="btn btn--primary btn--lg" (click)="continueShopping()" id="continue-shopping-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Continue Shopping
      </button>
    </div>

  </div>
</div>
